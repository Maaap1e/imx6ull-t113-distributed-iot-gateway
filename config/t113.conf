# T113 runtime configuration. Environment variables may override defaults.
BIND_IP="${BIND_IP:-0.0.0.0}"
TCP_PORT="${TCP_PORT:-5000}"

T113_LOG="${T113_LOG:-/tmp/t113_tcp.log}"
T113_PID="${T113_PID:-/tmp/t113_display_app.pid}"
T113_STATE="${T113_STATE:-/tmp/t113_sensor_state.json}"
T113_CSV="${T113_CSV:-/tmp/t113_sensor_data.csv}"
MAINTENANCE_PID="${MAINTENANCE_PID:-/tmp/t113_runtime_maintenance.pid}"
SUPERVISOR_PID="${SUPERVISOR_PID:-/tmp/t113_runtime_supervisor.pid}"
SUPERVISOR_LOG="${SUPERVISOR_LOG:-/tmp/t113_supervisor.log}"
SUPERVISOR_INTERVAL_SECONDS="${SUPERVISOR_INTERVAL_SECONDS:-5}"

# T113 has only about 54 MiB of tmpfs in the verified board configuration.
LOG_MAX_BYTES="${LOG_MAX_BYTES:-1048576}"
LOG_KEEP="${LOG_KEEP:-1}"
CSV_MAX_BYTES="${CSV_MAX_BYTES:-4194304}"
CSV_KEEP="${CSV_KEEP:-1}"
MAINTENANCE_INTERVAL_SECONDS="${MAINTENANCE_INTERVAL_SECONDS:-60}"
